<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Serializer Tests - Trello List Exporter</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 20px;
        background: #f5f7fb;
        color: #172b4d;
      }
      main {
        max-width: 800px;
        margin: 0 auto;
        background: white;
        border-radius: 8px;
        padding: 24px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      h1 {
        margin-top: 0;
        font-size: 1.75rem;
        line-height: 1.2;
      }
      #test-output {
        background: #f7f8fa;
        border: 1px solid #dfe1e6;
        border-radius: 6px;
        padding: 16px;
        font-family: "Monaco", "Menlo", monospace;
        font-size: 0.9rem;
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-word;
        max-height: 600px;
        overflow-y: auto;
      }
      .pass {
        color: #216f3b;
      }
      .fail {
        color: #c1272d;
      }
      .summary {
        margin-top: 16px;
        padding: 12px;
        border-radius: 6px;
        font-weight: 600;
      }
      .summary.passed {
        background: rgba(33, 111, 59, 0.1);
        color: #216f3b;
      }
      .summary.failed {
        background: rgba(193, 39, 45, 0.1);
        color: #c1272d;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Serializer Tests</h1>
      <p>Run tests for CSV and JSON serializers:</p>
      <button onclick="runTests()" style="padding: 10px 16px; font-size: 1rem; font-weight: 600; background: #0c66e4; color: white; border: none; border-radius: 4px; cursor: pointer;">
        Run All Tests
      </button>
      <div id="test-output"></div>
    </main>

    <script src="serializer-tests.js"></script>
    <script>
      function runTests() {
        const output = document.getElementById('test-output');
        const originalLog = console.log;
        let logOutput = '';

        console.log = function (message) {
          logOutput += message + '\n';
          originalLog(message);
        };

        // Clear previous output
        output.innerHTML = '';

        // Run tests
        const test1 = testCSVEscaping();
        const test2 = testCSVRow();
        const test3 = testJSONStructure();
        const test4 = testFilenameGeneration();

        console.log = originalLog;

        // Display output
        const lines = logOutput.split('\n');
        const html = lines
          .map(function (line) {
            if (line.includes('✓')) {
              return '<span class="pass">' + escapeHtml(line) + '</span>';
            } else if (line.includes('✗')) {
              return '<span class="fail">' + escapeHtml(line) + '</span>';
            } else {
              return escapeHtml(line);
            }
          })
          .join('\n');

        output.innerHTML = html;

        // Add summary
        const allPassed = test1 && test2 && test3 && test4;
        const summary = document.createElement('div');
        summary.className = 'summary ' + (allPassed ? 'passed' : 'failed');
        summary.textContent = allPassed ? '✓ All tests passed!' : '✗ Some tests failed';
        output.appendChild(summary);
      }

      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }
    </script>
  </body>
</html>
